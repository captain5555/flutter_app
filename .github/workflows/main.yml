name: Build iOS
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Install dependencies
        run: |
          # 进入真正的 Flutter 项目目录 (包含 pubspec.yaml 的地方)
          cd nas-material-manager/flutter
          flutter pub get
          # 进入上级的 ios 目录安装 pod
          cd ../ios
          pod repo update
          pod install

      - name: Build iOS
        run: |
          cd nas-material-manager/flutter
          flutter build ios --release --no-codesign

      - name: Upload iOS App
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: nas-material-manager/flutter/build/ios/iphoneos/
