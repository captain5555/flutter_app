name: Build iOS
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Install dependencies
        run: |
          # 1. 自动找到 pubspec.yaml 目录
          PROJECT_DIR=$(find . -name "pubspec.yaml" -type f -exec dirname {} \;)
          echo "✅ 找到项目目录: $PROJECT_DIR"
          
          # 2. 进入项目目录
          cd "$PROJECT_DIR"
          
          # 3. 自动找到 ios 目录 (如果项目里有 ios 文件夹)
          IOS_DIR=$(find . -name "ios" -type d | head -n 1)
          if [ -n "$IOS_DIR" ]; then
            echo "✅ 找到 iOS 目录: $IOS_DIR"
            cd "$IOS_DIR"
            pod repo update
            pod install
          else
            echo "⚠️  未找到 iOS 目录，可能是纯 Flutter 项目或已移动位置"
          fi

      - name: Build iOS
        run: |
          # 1. 自动找到 pubspec.yaml 目录
          PROJECT_DIR=$(find . -name "pubspec.yaml" -type f -exec dirname {} \;)
          echo "✅ 找到项目目录: $PROJECT_DIR"
          
          # 2. 进入项目目录并构建
          cd "$PROJECT_DIR"
          flutter build ios --release --no-codesign

      - name: Upload iOS App
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: build/ios/iphoneos/
